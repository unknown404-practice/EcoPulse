            --shadow-float: 0 20px 40px -10px rgba(0, 0, 0, 0.08);
        }

        [data-theme="dark"] {
            --bg:      oklch(20% 0.015 250);
            --surface: oklch(25% 0.015 250);
            --fg:      oklch(95% 0.01 250);
            --muted:   oklch(70% 0.02 250);
            --border:  oklch(35% 0.02 250);
            --accent:  oklch(75% 0.15 30);
            
            --success: oklch(70% 0.14 145);
            --warning: oklch(80% 0.14 70);
            --danger:  oklch(65% 0.16 25);
            
            --shadow-soft: 0 8px 30px rgba(0, 0, 0, 0.4);
            --shadow-float: 0 20px 40px -10px rgba(0, 0, 0, 0.6);

        body, .card, .btn, .input-field, .sidebar, .top-bar {
            transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
        }


        body.dark-theme {

            --surface: oklch(20% 0.01 250);
            --fg:      oklch(95% 0.01 250);
            --muted:   oklch(65% 0.02 250);
            --border:  oklch(28% 0.01 250);
            
            --shadow-soft: 0 8px 30px rgba(0, 0, 0, 0.4);
            --shadow-float: 0 20px 40px -10px rgba(0, 0, 0, 0.6);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: var(--fg); font-family: var(--font-body); line-height: 1.5; -webkit-font-smoothing: antialiased; min-height: 100vh; transition: background-color 0.3s, color 0.3s; overflow-x: hidden; overscroll-behavior-y: none; }

        .input-group { display: flex; flex-direction: column; gap: 6px; }

        .input-field:focus { border-color: var(--accent); }

        .arch-svg { width: 100%; height: auto; max-height: 450px; }
        .arch-node { cursor: pointer; transition: all 0.3s; }
        .arch-node rect { fill: var(--surface); stroke: var(--border); stroke-width: 1.5; transition: inherit; }
        .arch-node:hover rect { stroke: var(--accent); fill: var(--bg); }
        .arch-node.active rect { stroke: var(--accent); stroke-width: 2.5; fill: var(--bg); }
        .arch-node text { fill: var(--fg); pointer-events: none; }
        .arch-node .node-type { fill: var(--muted); font-size: 9px; font-family: var(--font-mono); text-transform: uppercase; }
        .connection-line { stroke: var(--border); stroke-width: 1.5; fill: none; transition: stroke 0.3s; }

        .indicator { width: 8px; height: 8px; border-radius: 50%; display: inline-block; position: relative; flex-shrink: 0; }
        .indicator.green { background: var(--success); box-shadow: 0 0 10px var(--success); }
        .indicator.warning { background: var(--warning); box-shadow: 0 0 10px var(--warning); }
        .indicator.danger { background: var(--danger); box-shadow: 0 0 10px var(--danger); }
        .indicator.green::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--success); border-radius: 50%; animation: pulse-ring 2s infinite; }
        @keyframes pulse-ring { 0% { transform: scale(1); opacity: 0.7; } 100% { transform: scale(3); opacity: 0; } }

        .view-enter { animation: view-fade-in 0.4s cubic-bezier(0.16, 1, 0.3, 1); }

        .code-window { background: #111; border-radius: var(--radius-md); overflow: hidden; font-family: var(--font-mono); font-size: 13px; color: #d4d4d4; border: 1px solid #222; max-width: 100%; box-sizing: border-box; }
        .code-header { background: #1a1a1a; padding: 8px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .code-body { padding: 16px; line-height: 1.6; overflow-x: auto; width: 100%; }

        .avatar-lg { width: 120px; height: 120px; font-size: 36px; border: 2px solid var(--border); }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-up { animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.3s; }
        .delay-3 { animation-delay: 0.5s; }

        .landing-page { position: fixed; inset: 0; background: #050505; color: #fff; z-index: 10000; display: flex; flex-direction: column; overflow: hidden; font-family: var(--font-body); }

        .landing-title { font-family: var(--font-display); font-size: 80px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 24px; background: linear-gradient(180deg, #fff 0%, #a0a0a0 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        @media (max-width: 768px) {
            .desktop-controls { display: none !important; }
            .mobile-controls { display: flex !important; gap: 12px; align-items: center; position: relative; }
 .landing-title { font-size: 42px; } .landing-nav { padding: 16px 20px; flex-direction: column; gap: 16px; } .landing-nav > div:last-child { width: 100%; justify-content: center; } .landing-main p { font-size: 16px !important; } }

        .tooltip::after { content: ''; position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%); border-width: 5px 5px 0; border-style: solid; border-color: rgba(0,0,0,0.85) transparent transparent transparent; }

        .bar-chart-container { display: flex; align-items: flex-end; gap: 20px; height: 280px; padding: 30px 10px 40px 10px; border-bottom: 1px solid var(--border); }

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const DB = {
            get: (k, def) => { const v = localStorage.getItem(k); return v !== null ? JSON.parse(v) : def; },
            set: (k, v) => localStorage.setItem(k, JSON.stringify(v))
        };

        const REGIONS = {
            uk: { id: 'uk', name: 'UK-National', api: 'uk', lat: 51.5, lon: -0.1, tz: 'Europe/London' },
            eu: { id: 'eu', name: 'EU-Central (GER)', api: 'weather', lat: 51.16, lon: 10.45, tz: 'Europe/Berlin' },
            us: { id: 'us', name: 'US-East (NY)', api: 'weather', lat: 40.71, lon: -74.00, tz: 'America/New_York' },
            asia: { id: 'asia', name: 'Asia-South (IN)', api: 'weather', lat: 19.07, lon: 72.87, tz: 'Asia/Kolkata' }
        };

        const firebaseConfig = {
            apiKey: "YOUR_API_KEY_HERE",
            authDomain: "ecopulse-68cb3.firebaseapp.com",
            projectId: "ecopulse-68cb3",
            storageBucket: "ecopulse-68cb3.firebasestorage.app",
            messagingSenderId: "17305533738",
            appId: "1:17305533738:web:be6a7449eee5b1ff9df253",
            measurementId: "G-H2FMDFPMQY"
        };
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const googleProvider = new firebase.auth.GoogleAuthProvider();

        const DashboardApp = ({ user, onSignOut }) => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [showSettings, setShowSettings] = useState(false);
            

            const [region, setRegion] = useState('uk');
            const [clock, setClock] = useState('');
            
            const [threshold, setThreshold] = useState(DB.get('ep_threshold', 150));
            const [minWindow, setMinWindow] = useState(DB.get('ep_window', 45));
            const [isHalted, setIsHalted] = useState(DB.get('ep_halted', false));
            const [accent, setAccent] = useState(DB.get('ep_accent', '#D97757'));
            const [theme, setTheme] = useState(DB.get('ep_theme', 'dark'));
            useEffect(() => {
                document.documentElement.setAttribute('data-theme', theme);
                DB.set('ep_theme', theme);
            }, [theme]);

            const [profileName, setProfileName] = useState(user?.displayName || 'Developer');
            const [userName, setUserName] = useState(user?.email || 'admin');
            const [profilePic, setProfilePic] = useState(user?.photoURL || '');

            const [intensity, setIntensity] = useState(null);
            const [forecast, setForecast] = useState([]);
            const [logs, setLogs] = useState([{ ts: new Date().toLocaleTimeString(), msg: "SYSTEM: Initializing Database & Regions...", type: "info" }]);
            const [activeWorkloads, setActiveWorkloads] = useState(1208);
            const [statusIndex, setStatusIndex] = useState('pending');

            const addLog = (msg, type = "info") => {
                setLogs(prev => [...prev.slice(-14), { ts: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'}), msg, type }]);
            };

            useEffect(() => {
                const handleToggle = () => {
                    const el = document.getElementById('simPopup');
                    if(el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
                };
                window.addEventListener('toggleSimPopup', handleToggle);
                const int = setInterval(() => {
                    const timeOpts = { timeZone: REGIONS[region].tz, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
                    setClock(new Date().toLocaleTimeString('en-US', timeOpts));
                }, 1000);
                return () => { clearInterval(int); window.removeEventListener('toggleSimPopup', handleToggle); };
            }, [region]);

            const fetchRegionData = async (forceFallback = false) => {
                if (isHalted) return;
                const reg = REGIONS[region];
                try {
                    addLog(`API: Polling data for ${reg.name}...`, "info");
                    if (reg.api === 'uk' && !forceFallback) {
                        const resCurrent = await fetch("https://api.carbonintensity.org.uk/intensity");
                        const dataCur = await resCurrent.json();
                        const current = dataCur.data[0].intensity;
                        const val = current.actual || current.forecast;
                        setIntensity(val);
                        setStatusIndex(val <= threshold ? 'low' : 'high');
                        addLog(`API: Received UK-NATIONAL (${val}g)`, "success");
                        const dateStr = new Date().toISOString().split('T')[0];
                        const resFore = await fetch(`https://api.carbonintensity.org.uk/intensity/date/${dateStr}`);
                        const dataFore = await resFore.json();
                        setForecast(dataFore.data.map(d => d.intensity.forecast));
                    } else {
                        const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${reg.lat}&longitude=${reg.lon}&current=wind_speed_10m,shortwave_radiation&hourly=wind_speed_10m,shortwave_radiation`);
                        const data = await res.json();
                        const wind = data.current.wind_speed_10m;
                        const solar = data.current.shortwave_radiation;
                        const calcCO2 = (w, s) => Math.max(50, Math.min(500, Math.floor(400 - (w * 8) - (s * 0.3))));
                        const val = calcCO2(wind, solar);
                        setIntensity(val);
                        setStatusIndex(val <= threshold ? 'low' : 'high');
                        addLog(`API: Open-Meteo generated (${val}g) from live weather.`, "success");
                        const hourly = [];
                        for(let i=0; i<24; i++) hourly.push(calcCO2(data.hourly.wind_speed_10m[i], data.hourly.shortwave_radiation[i]));
                        setForecast(hourly);
                    }
                } catch(e) {
                    addLog(`API: Failed to fetch data for ${reg.name}`, "err");
                }
            };

            useEffect(() => {
                if (isHalted) {
                    setActiveWorkloads(0);
                    setStatusIndex('halted');
                    return;
                }
                if (intensity === null) return;
                if (intensity <= threshold) {
                    setActiveWorkloads(1690);
                    addLog(`ENGINE: Intensity (${intensity}g) <= Threshold (${threshold}g). Grid is GREEN. Resuming tasks...`, "success");
                } else {
                    setActiveWorkloads(740);
                    addLog(`ENGINE: Intensity (${intensity}g) > Threshold (${threshold}g). Grid is RED. Pausing heavy tasks...`, "warn");
                }
            }, [intensity, threshold, isHalted]);

            useEffect(() => {
                fetchRegionData();
                const intId = setInterval(() => fetchRegionData(), 60000);
                return () => clearInterval(intId);
            }, [region, isHalted]);

            const triggerFallback = () => fetchRegionData(true);
            const toggleTheme = () => setTheme(prev => prev === 'dark' ? 'light' : 'dark');

            return (
                <div className="app-shell">
                    <Sidebar 
                        activeTab={activeTab} setTab={setActiveTab} 
                        region={region} setRegion={setRegion} 
                        clock={clock} theme={theme} toggleTheme={toggleTheme}
                        profileName={profileName} userName={userName} profilePic={profilePic}
                    />
                    <main className="main-canvas">
                        {activeTab === 'dashboard' && <Dashboard 
                            intensity={intensity} forecast={forecast} logs={logs} 
                            activeWorkloads={activeWorkloads} statusIndex={statusIndex} 
                            triggerFallback={triggerFallback} isHalted={isHalted}
                        />}
                        {activeTab === 'architecture' && <ArchitectureView />}
                        {activeTab === 'historical' && <HistoricalView region={region} threshold={threshold} />}
                        {activeTab === 'integrations' && <Integrations region={region} threshold={threshold} />}
                        {activeTab === 'profile' && <ProfileView 
                            profileName={profileName} setProfileName={setProfileName}
                            userName={userName} setUserName={setUserName}
                            profilePic={profilePic} setProfilePic={setProfilePic}
                            onSignOut={onSignOut} setTab={setActiveTab}
                        />}
                        {activeTab === 'documentation' && <DocumentationView setTab={setActiveTab} />}
                        {activeTab === 'settings' && <Settings 
                            threshold={threshold} setThreshold={t => {setThreshold(t); DB.set('ep_threshold', t);}}
                            minWindow={minWindow} setMinWindow={w => {setMinWindow(w); DB.set('ep_window', w);}}
                            isHalted={isHalted} setIsHalted={h => {setIsHalted(h); DB.set('ep_halted', h); addLog(`SYSTEM: Engine Halted = ${h}`, h?'err':'info')}}
                        />}
                        <footer style={{marginTop: 'auto', paddingTop: '64px', paddingBottom: '16px', textAlign: 'center', color: 'var(--muted)', fontSize: '13px', fontFamily: 'var(--font-body)'}}>
                            &copy; {new Date().getFullYear()} EcoPulse. All rights reserved.
                        </footer>
                    
                    

                    {/* Simulation Popup */}
                    <div id="simPopup" style={{display: 'none', position: 'fixed', top: '80px', right: '16px', background: 'var(--surface)', border: '1px solid var(--border)', padding: '20px', borderRadius: 'var(--radius-md)', boxShadow: 'var(--shadow-float)', zIndex: 1001, minWidth: '280px'}}>
                        <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px'}}>
                            <div style={{fontSize: '11px', fontWeight: '800', textTransform: 'uppercase', color: 'var(--muted)', letterSpacing: '0.05em'}}>Simulation Engine</div>
                            <button onClick={() => document.getElementById('simPopup').style.display='none'} style={{background:'transparent', border:'none', color:'var(--muted)', cursor:'pointer'}}>&times;</button>
                        </div>
                        <div style={{marginBottom: '16px'}}>
                            <div style={{fontSize: '12px', marginBottom: '8px', color: 'var(--muted)'}}>Monitoring Region</div>
                            <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '8px'}}>
                                {['uk', 'eu', 'us', 'asia'].map(r => (
                                    <button key={r} onClick={() => { setRegion(r); document.getElementById('simPopup').style.display='none'; }} className={region === r ? 'btn-primary' : ''} style={{padding: '8px', fontSize: '12px', borderRadius: 'var(--radius-md)', cursor: 'pointer', border: region === r ? 'none' : '1px solid var(--border)', background: region === r ? '' : 'transparent', color: region === r ? '' : 'var(--fg)', fontWeight: '600', display: 'flex', justifyContent: 'center'}}>
                                        {r === 'uk' ? 'UK (LIVE)' : r.toUpperCase()}
                                    </button>
                                ))}
                            </div>
                        </div>
                        <div>
                            <div style={{fontSize: '12px', marginBottom: '8px', color: 'var(--muted)'}}>Global Sync Time</div>
                            <div style={{padding: '12px', background: 'var(--bg)', borderRadius: 'var(--radius-sm)', border: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                                <span style={{fontSize: '14px', fontFamily: 'var(--font-mono)'}}>{clock || '--:--:--'}</span>
                                <div style={{width: '8px', height: '8px', borderRadius: '50%', background: 'var(--success)', boxShadow: '0 0 8px var(--success)'}}></div>
                            </div>
                        </div>
                    </div>

                    {/* Prototype Controls Panel */}
                    <div style={{position: 'fixed', bottom: '80px', right: '24px', zIndex: 1000, display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: '16px'}}>
                        {showSettings && (
                            <div style={{background: 'var(--surface)', border: '1px solid var(--border)', padding: '16px', borderRadius: 'var(--radius-md)', boxShadow: 'var(--shadow-float)', width: '220px', animation: 'fadeIn 0.2s ease'}}>
                                <div style={{fontSize: '11px', fontWeight: '800', textTransform: 'uppercase', color: 'var(--muted)', marginBottom: '12px'}}>System Controls</div>
                                <div style={{display: 'flex', flexDirection: 'column', gap: '12px'}}>
                                    <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: '20px'}}>
                                        <span style={{fontSize: '12px'}}>Accent</span>
                                        <input type="color" defaultValue={theme === 'dark' ? '#D97757' : '#D97757'} onChange={(e) => document.documentElement.style.setProperty('--accent', e.target.value)} />
                                    </div>
                                    <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: '20px'}}>
                                        <span style={{fontSize: '12px'}}>Radii</span>
                                        <input type="range" min="0" max="30" defaultValue="16" onChange={(e) => document.documentElement.style.setProperty('--radius-lg', e.target.value + 'px')} />
                                    </div>
                                </div>
                            </div>
                        )}
                        <div onClick={() => setShowSettings(!showSettings)} style={{width: '48px', height: '48px', borderRadius: '50%', background: 'conic-gradient(from 0deg, #ff5f56, #ffbd2e, #27c93f, #007bff, #ff5f56)', display: 'grid', placeItems: 'center', cursor: 'pointer', boxShadow: '0 4px 12px rgba(0,0,0,0.3)', transition: 'transform 0.2s ease', transform: showSettings ? 'rotate(45deg)' : 'rotate(0deg)'}}>
                            <div style={{width: '40px', height: '40px', borderRadius: '50%', background: 'var(--surface)', display: 'grid', placeItems: 'center', color: 'var(--fg)'}}>
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                            </div>
                        </div>
                    </div>

</main>
                </div>
            );
        };

                        </div>
                        <div className="brand-subtitle" style={{fontSize: '11px', color: 'var(--muted)', fontWeight: '700', textTransform: 'uppercase', letterSpacing: '1.5px', marginTop: '2px'}}>Production Engine</div>

                    <div className="desktop-theme-toggle theme-toggle" onClick={toggleTheme} style={{background: 'var(--bg)', borderRadius: '50%', border: '1px solid var(--border)', cursor: 'pointer', color: 'var(--muted)', width: '36px', height: '36px', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0}}>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    </div>

                    <div className="mobile-controls" style={{alignItems: 'center', gap: '8px', flexShrink: 0}}>
                        <div className="mobile-region-pill" onClick={() => window.dispatchEvent(new CustomEvent('toggleSimPopup'))} style={{display: 'flex', alignItems: 'center', gap: '6px', background: 'var(--bg)', padding: '6px 12px', borderRadius: '20px', border: '1px solid var(--border)', cursor: 'pointer', fontSize: '12px', fontWeight: '600', color: 'var(--muted)', whiteSpace: 'nowrap'}}>
                            <div style={{width: '6px', height: '6px', borderRadius: '50%', background: 'var(--success)', boxShadow: '0 0 6px var(--success)'}}></div>

                        </div>
                        <div className="mobile-profile-btn" onClick={() => setTab('profile')} style={{width: '32px', height: '32px', borderRadius: '50%', background: 'var(--accent)', color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', fontWeight: '600', flexShrink: 0}}>
                            {profilePic ? <img src={profilePic} style={{width:'100%', height:'100%', borderRadius:'50%', objectFit:'cover'}} /> : profileName.charAt(0).toUpperCase()}
                        </div>
                    </div>
                </div>
                <nav className="nav-menu">
                    <button className={`nav-link ${activeTab === 'dashboard' ? 'active' : ''}`} onClick={() => setTab('dashboard')}>Dashboard</button>
                    <button className={`nav-link ${activeTab === 'architecture' ? 'active' : ''}`} onClick={() => setTab('architecture')}>Architecture</button>
                    <button className={`nav-link ${activeTab === 'historical' ? 'active' : ''}`} onClick={() => setTab('historical')}>Historical Preview</button>
                    <button className={`nav-link ${activeTab === 'settings' ? 'active' : ''}`} onClick={() => setTab('settings')}>Settings</button>
                </nav>

                <div className="desktop-controls">
                    <div onClick={() => window.dispatchEvent(new CustomEvent('toggleSimPopup'))} style={{display: 'flex', alignItems: 'center', gap: '6px', background: 'var(--bg)', padding: '10px 16px', borderRadius: 'var(--radius-md)', border: '1px solid var(--border)', cursor: 'pointer', fontSize: '13px', fontWeight: '600', color: 'var(--muted)', whiteSpace: 'nowrap', justifyContent: 'center'}}>
                        <div style={{width: '8px', height: '8px', borderRadius: '50%', background: 'var(--success)', boxShadow: '0 0 8px var(--success)'}}></div>
                        {region.toUpperCase()} • {clock || '--:--'}
                    </div>
                    
                    <div onClick={() => setTab('profile')} style={{display: 'flex', alignItems: 'center', gap: '12px', background: 'var(--bg)', padding: '10px 16px', borderRadius: 'var(--radius-md)', border: '1px solid var(--border)', cursor: 'pointer', color: 'var(--fg)', transition: 'all 0.2s'}} onMouseOver={e => e.currentTarget.style.borderColor='var(--accent)'} onMouseOut={e => e.currentTarget.style.borderColor='var(--border)'}>
                        <div style={{width: '32px', height: '32px', borderRadius: '50%', background: 'var(--accent)', color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: '600', fontSize: '15px', flexShrink: 0}}>

        const Dashboard = ({ intensity, forecast, logs, activeWorkloads, statusIndex, triggerFallback, isHalted, setTab }) => {
    const [hoverIdx, setHoverIdx] = React.useState(null);
    return (
            <div className="view-enter">
                <header style={{marginBottom: '40px', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end'}}>
                    <div>
                        <h2 style={{fontSize: '36px', marginBottom: '8px'}}>Dashboard Overview</h2>
                        <p style={{color: 'var(--muted)', fontSize: '18px'}}>Real-time telemetry and task orchestration overview.</p>
                    </div>
                    <div style={{display: 'flex', gap: '12px'}}>
                        
                        <button className="btn btn-primary" onClick={triggerFallback} disabled={isHalted}>Force Weather Fallback</button>
                    </div>
                </header>

                <div className="stats-grid">
                    <div className="card stat-card">
                        <div className="stat-header">
                            <span className="stat-label">Grid Intensity</span>
                            <span className={`indicator ${statusIndex}`}></span>
                        </div>
                        <div className="stat-value">{intensity !== null ? intensity : '--'} <span style={{fontSize: '14px', color: 'var(--muted)'}}>gCO₂/kWh</span></div>
                        <div className="stat-meta trend-down">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>
                            12.4% below regional baseline
                        </div>
                    </div>
                    <div className="card stat-card">
                        <div className="stat-header">
                            <span className="stat-label">Carbon Prevented</span>
                        </div>
                        <div className="stat-value">842.2 <span style={{fontSize: '14px', color: 'var(--muted)'}}>kg</span></div>
                        <div className="stat-meta" style={{color: 'var(--success)'}}>
                            Equivalent to planting 14 trees today
                        </div>
                    </div>
                    <div className="card stat-card">
                        <div className="stat-header">
                            <span className="stat-label">Active Workloads</span>
                        </div>
                        <div className="stat-value">{activeWorkloads.toLocaleString()}</div>
                        <div className="stat-meta">
                            482 deferred to Green Window
                        </div>
                    <div className="card stat-card" style={{cursor: 'pointer', transition: 'transform 0.2s', position: 'relative', overflow: 'hidden'}} onClick={() => setTab('historical')} onMouseOver={e => e.currentTarget.style.transform = 'translateY(-2px)'} onMouseOut={e => e.currentTarget.style.transform = 'none'}>
                        <div className="stat-header">
                            <span className="stat-label">Historical Preview</span>
                        </div>
                        <div style={{display: 'flex', alignItems: 'flex-end', height: '40px', gap: '4px', marginTop: '12px', zIndex: 1, position: 'relative'}}>
                            {[40, 60, 100, 30, 80, 50, 70].map((h, i) => <div key={i} style={{flex: 1, height: h+'%', background: 'var(--accent)', borderRadius: '2px', opacity: 0.8}}></div>)}
                        </div>
                        <div className="stat-meta" style={{marginTop: '12px', zIndex: 1, position: 'relative'}}>
                            View 7-day carbon prevention
                        </div>
                        <div style={{position: 'absolute', inset: 0, background: 'linear-gradient(180deg, transparent 50%, color-mix(in oklch, var(--accent) 10%, transparent))', zIndex: 0}}></div>
                    </div>
                    </div>
                </div>

                <div className="dashboard-grid">
                    <div className="card">
                        <h3 className="card-title">Predictive Emission Curve</h3>
                        <div style={{height: '300px', marginTop: '32px', position: 'relative'}}>
                            <svg viewBox="0 0 800 200" style={{width: '100%', height: '100%', overflow: 'visible'}} onMouseLeave={() => setHoverIdx(null)}>
                                {(() => {
                                    const maxH = 160;
                                    const yBase = 180;
                                    const maxV = 500;
                                    
                                    const getPts = () => {
                                        if (forecast && forecast.length >= 24) {
                                            // Pick 5 points from forecast (e.g. 0, 6, 12, 18, 23)
                                            // For UK (48 points), we use 0, 12, 24, 36, 47
                                            const step = Math.floor(forecast.length / 4);
                                            return [
                                                {x: 0, time: "00:00", val: forecast[0]},
                                                {x: 200, time: "06:00", val: forecast[step]},
                                                {x: 400, time: "12:00", val: forecast[step*2]},
                                                {x: 600, time: "18:00", val: forecast[step*3]},
                                                {x: 800, time: "23:00", val: forecast[forecast.length - 1]}
                                            ].map(p => ({...p, y: yBase - (p.val / maxV) * maxH}));
                                        }
                                        // Default fallback
                                        return [
                                            {x: 0, y: 150, time: "08:00", val: 320},
                                            {x: 200, y: 120, time: "12:00", val: 260},
                                            {x: 400, y: 100, time: "16:00", val: 140},
                                            {x: 600, y: 180, time: "20:00", val: 380},
                                            {x: 800, y: 80, time: "00:00", val: 110}
                                        ];
                                    };
                                    
                                    const pts = getPts();
                                    
                                    // Smooth curve path
                                    const pathD = `M${pts[0].x},${pts[0].y} 
                                        C100,${pts[0].y} 100,${pts[1].y} ${pts[1].x},${pts[1].y} 
                                        C300,${pts[1].y} 300,${pts[2].y} ${pts[2].x},${pts[2].y}
                                        C500,${pts[2].y} 500,${pts[3].y} ${pts[3].x},${pts[3].y}
                                        C700,${pts[3].y} 700,${pts[4].y} ${pts[4].x},${pts[4].y}`;

                                    return (
                                        <>
                                            <path d={pathD} fill="none" stroke="var(--accent)" strokeWidth="3" />
                                            {pts.map((pt, i) => (
                                                <g key={i}>
                                                    <circle cx={pt.x} cy={pt.y} r={hoverIdx === i ? "8" : "5"} fill={hoverIdx === i ? "var(--fg)" : "var(--accent)"} stroke="var(--surface)" strokeWidth="2"
                                                        onMouseEnter={() => setHoverIdx(i)}
                                                        style={{cursor: 'pointer', transition: 'all 0.2s'}}
                                                    />
                                                    {hoverIdx === i && (
                                                        <g>
                                                            <rect x={pt.x - 50} y={pt.y - 50} width="100" height="40" rx="8" fill="var(--surface)" stroke="var(--border)" />
                                                            <text x={pt.x} y={pt.y - 35} fontSize="12" fontWeight="600" fill="var(--fg)" textAnchor="middle">{pt.val} gCO₂/kWh</text>
                                                            <text x={pt.x} y={pt.y - 20} fontSize="10" fill="var(--muted)" textAnchor="middle">{pt.time}</text>
                                                        </g>
                                                    )}
                                                </g>

const HistoricalView = ({ region, threshold }) => {
            // Generate deterministic dummy data based on region and threshold
            const seed = region.charCodeAt(0) + threshold;
            const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
            
            // Generate last 7 days ending yesterday
            const todayIdx = new Date().getDay();
            const last7Days = [];
            for(let i=7; i>=1; i--) {
                const dIdx = (todayIdx - i + 7) % 7;
                last7Days.push(days[dIdx === 0 ? 6 : dIdx - 1]); // JS getDay() is 0=Sunday
            }
            
            const descriptions = [
                'Workload shifted during evening peak fossil fuel usage.',
                'Heavy compute paused due to low wind generation.',
                'Optimal solar generation utilized for AI training.',
                'Minor adjustments made during grid fluctuations.',
                'Weekend preparation tasks shifted to green windows.',
                'Standard weekend background processing.',
                'High wind generation allowed massive compute bursts.',
                'Cloud workloads dynamically routed to cooler regions.',
                'Data sync paused during unexpected grid strain.',
                'Successfully bypassed peak hour emissions.'
            ];

            const historicalData = last7Days.map((day, i) => {
                const pseudoRandom = Math.sin(seed + i) * 10000;
                const r = pseudoRandom - Math.floor(pseudoRandom);
                
                // Base value based on threshold (lower threshold = more paused = more saved)
                const baseVal = (100 - threshold) * 10; 
                // Add randomness
                const val = Math.floor(baseVal + r * 300);
                
                const descIdx = Math.floor(r * descriptions.length);
                return {
                    day,
                    val,
                    desc: descriptions[descIdx],
                    h: 0 // Will calculate relative to max later
                };
            });

            const maxVal = Math.max(...historicalData.map(d => d.val));
            historicalData.forEach(d => {
                d.h = Math.max(10, Math.floor((d.val / maxVal) * 100));
            });

            return (
            <div className="view-enter">
                <header style={{marginBottom: '40px'}}>
                    <h2 style={{fontSize: '36px', marginBottom: '8px'}}>Historical Preview</h2>
                    <p style={{color: 'var(--muted)', fontSize: '18px'}}>7-Day aggregate carbon prevention telemetry for {region.toUpperCase()}.</p>
                </header>
                <div className="card" style={{padding: 'clamp(16px, 5vw, 32px)'}}>
                    <h3 className="card-title" style={{marginBottom: '32px'}}>Carbon Prevented Day by Day</h3>
                    <div style={{overflowX: 'visible', paddingBottom: '20px', borderBottom: '1px solid var(--border)'}}>
                        <div style={{display: 'flex', alignItems: 'flex-end', height: '250px', gap: '2%', width: '100%'}}>
                            {historicalData.map((b, i) => (
                                <div key={i} style={{flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '8px', height: '100%', justifyContent: 'flex-end', minWidth: '0'}}>
                                    <div style={{fontSize: 'clamp(8px, 2vw, 12px)', color: 'var(--fg)', fontWeight: '700', padding: '2px 4px', background: 'var(--surface)', borderRadius: '4px', border: '1px solid var(--border)', whiteSpace: 'nowrap'}}>{b.val} kg</div>
                                    <div style={{width: '100%', maxWidth: '40px', height: b.h + '%', minHeight: '20px', background: 'var(--accent)', borderRadius: '6px 6px 0 0', opacity: i === 6 ? 1 : 0.6, transition: 'all 0.3s ease', cursor: 'pointer'}} 
                                        onMouseOver={e => e.target.style.opacity = '1'} 
                                        onMouseOut={e => e.target.style.opacity = i === 6 ? '1' : '0.6'}>
                                    </div>
                                    <div style={{fontSize: 'clamp(10px, 3vw, 13px)', fontWeight: '600', color: 'var(--muted)'}}>{b.day.substring(0,3)}</div>
                                </div>
                            ))}
                        </div>
                    </div>
                    
                    <div style={{marginTop: '40px'}}>
                        <h3 className="card-title" style={{marginBottom: '16px'}}>Day-wise Detailed History</h3>
                        <div style={{display: 'flex', flexDirection: 'column', gap: '12px'}}>
                            {historicalData.map((b, i) => (
                                <div key={i} style={{display: 'flex', justifyContent: 'space-between', padding: '16px', background: 'var(--bg)', borderRadius: 'var(--radius-md)', border: '1px solid var(--border)', flexWrap: 'wrap', gap: '8px'}}>

                        <div className="card" style={{display: 'flex', flexDirection: 'column', gap: '32px', alignSelf: 'start'}}>
                            <div style={{display: 'flex', alignItems: 'center', gap: '32px', flexWrap: 'wrap'}}>
                                <div style={{display: 'flex', flexDirection: 'column', gap: '16px', alignItems: 'center'}}>
                                    <label className="avatar-upload">
                                        <input type="file" accept="image/*" style={{display: 'none'}} onChange={handleImageUpload} />
                                        {localPic ? <img src={localPic} className="avatar avatar-lg" style={{width:'80px', height:'80px'}} /> : <div className="avatar avatar-lg" style={{width:'80px', height:'80px', fontSize:'32px'}}>{localName.charAt(0).toUpperCase()}</div>}
                                        <div className="avatar-overlay">
                                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                                        </div>
                                    </label>
                                    <span style={{fontSize: '11px', fontWeight: '700', textTransform: 'uppercase', color: 'var(--muted)', letterSpacing: '0.05em'}}>Upload Picture</span>
                                </div>
                                <div style={{flex: 1, display: 'flex', flexDirection: 'column', gap: '20px', minWidth: '250px'}}>
                                    <div className="input-group">
                                        <label className="input-label">Display Name</label>
                                        <input type="text" className="input-field" value={localName} onChange={e => setLocalName(e.target.value)} />
                                    </div>
                                    <div className="input-group">
                                        <label className="input-label">Username / Email</label>
                                        <input type="text" className="input-field" value={localUser} onChange={e => setLocalUser(e.target.value)} />
                                    </div>
                                </div>
                            </div>
                            <div style={{display: 'flex', gap: '16px', borderTop: '1px solid var(--border)', paddingTop: '24px', alignItems: 'center', flexWrap: 'wrap'}}>
                                <button className="btn btn-outline" onClick={onSignOut} style={{color: 'var(--danger)', borderColor: 'var(--danger)'}}>Sign Out</button>
                                <div style={{flex: 1, minWidth: '20px'}}></div>
                                <button className="btn btn-outline" onClick={() => { handleDiscard(); setTab('dashboard'); }}>Discard</button>
                                <button className="btn btn-primary" onClick={handleSave} style={{minWidth: '120px'}}>{saved ? 'Saved!' : 'Save Profile'}</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };
        
        const LandingPage = ({ onLogin, onWelcome }) => (
            <div className="landing-page" style={{position:'fixed',inset:0,background:'#050505',zIndex:10000,display:'flex',flexDirection:'column'}}>
                <div className="landing-bg" style={{position:'absolute',inset:0,zIndex:0}}><img src="videoframe_14142.png" style={{width:'100%',height:'100%',objectFit:'cover',opacity:0.5}} /></div>
                <nav className="landing-nav" style={{position:'relative',zIndex:10,display:'flex',justifyContent:'space-between',padding:'24px 48px',color:'#fff',alignItems:'center'}}>
                    <div style={{fontSize:'24px',fontWeight:'bold',display:'flex',alignItems:'center',gap:'12px'}}><img src="library.png" style={{height:'40px'}}/>EcoPulse</div>
                    <div style={{display:'flex',gap:'16px'}}>
                        <button className="btn btn-outline" style={{color:'#fff',borderColor:'#333'}} onClick={onLogin}>Log In</button>
                        <button className="btn btn-primary" onClick={onWelcome}>Welcome</button>
                    </div>
                </nav>
                <div className="landing-main" style={{flex:1,display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'center',position:'relative',zIndex:10,color:'#fff',textAlign:'center',padding:'0 24px'}}>
                    <h1 className="landing-title" style={{fontSize:'80px',fontWeight:'800',marginBottom:'24px',letterSpacing:'-0.02em',lineHeight:'1.1',background:'linear-gradient(180deg, #fff 0%, #a0a0a0 100%)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>Carbon-Aware.<br/>Intelligent Orchestration.</h1>
                    <p style={{fontSize:'18px',color:'#aaa',maxWidth:'600px',marginBottom:'48px'}}>EcoPulse detects dirty energy grids in real-time and automatically shifts your massive computing workloads to green energy hours.</p>
                    <button className="btn btn-primary" style={{padding:'16px 32px',fontSize:'18px',borderRadius:'50px'}} onClick={onWelcome}>Enter Production Engine</button>
                </div>
            </div>
        );

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            const handleLogin = async () => {
                try { 
                    await auth.signInWithPopup(googleProvider); 
                } catch (e) { 
                    console.error(e); 
                    alert("Sign In Failed: " + e.message); 
                }
            };

            const handleSignOut = async () => { await auth.signOut(); };

            if (loading) return <div style={{height:'100vh', display:'flex', alignItems:'center', justifyContent:'center'}}>Loading...</div>;
            
            if (!user) {
                return <LandingPage onLogin={handleLogin} onWelcome={handleLogin} />;
            }
            
            return <DashboardApp user={user} onSignOut={handleSignOut} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
